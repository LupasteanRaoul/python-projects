<!DOCTYPE html>
<html>
<head>
    <title>Toate tranzacțiile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Toate tranzacțiile</h1>
        <a href="/" class="btn btn-primary mb-3">← Înapoi</a>
        
        <table class="table">
            <tr>
                <th>Data</th>
                <th>Categorie</th>
                <th>Descriere</th>
                <th>Tip</th>
                <th>Suma</th>
            </tr>
            {% for t in transactions %}
            <tr>
                <td>{{ t.date }}</td>
                <td>{{ t.category }}</td>
                <td>{{ t.description }}</td>
                <td>
                    {% if t.type == 'income' %}
                    <span class="badge bg-success">Venit</span>
                    {% else %}
                    <span class="badge bg-danger">Cheltuială</span>
                    {% endif %}
                </td>
                <td>{{ t.amount }} lei</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
